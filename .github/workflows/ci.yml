name: API Test Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── STEP 1: Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── STEP 2: Install Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── STEP 3: Run all tests ──
      - name: Run tests with Maven
        id: run_tests
        run: |
          mvn clean test 2>&1 | tee test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          TOTAL=$(grep -oP 'Tests run: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          FAILURES=$(grep -oP 'Failures: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          ERRORS=$(grep -oP 'Errors: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' test-output.txt | tail -1 || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

          if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ── STEP 4: Parse failure details with Python ──
      - name: Parse failure details
        if: always()
        run: |
          python3 << 'PYEOF'
          # (Python parsing code unchanged)
          PYEOF

      # ── STEP 6: Generate Allure Report ──
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report -q 2>/dev/null || true

      # ── STEP 7: Upload Allure Report artifact ──
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 30

      # ── STEP 8: Upload Surefire Reports artifact ──
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30

      # ── STEP 9: Deploy Allure Report to GitHub Pages ──
      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-maven-plugin/

      # ── STEP 10: Slack - Passed ──
      - name: Slack Notification - Passed
        if: always() && steps.run_tests.outputs.has_failures == 'false'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "blocks": [
              {
                "type": "header",
                "text": {"type": "plain_text", "text": "✅ All Tests Passed", "emoji": true}
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}"},
                  {"type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}"},
                  {"type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}"},
                  {"type": "mrkdwn", "text": "*Commit:*\n${{ steps.run_tests.outputs.commit_msg }}"}
                ]
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Total:* ${{ steps.run_tests.outputs.total }}"},
                  {"type": "mrkdwn", "text": "*Passed:* ${{ steps.run_tests.outputs.passed }}"},
                  {"type": "mrkdwn", "text": "*Failed:* 0"},
                  {"type": "mrkdwn", "text": "*Skipped:* ${{ steps.run_tests.outputs.skipped }}"}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Run Details"},
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  },
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Allure Report"},
                    "url": "https://kageruka02.github.io/API-test-automation/"
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK_URL }}

      # ── STEP 11: Slack - Failed ──
      - name: Slack Notification - Failed
        if: always() && steps.run_tests.outputs.has_failures == 'true'
        run: |
          SLACK_DETAILS=$(python3 -c "
          import json
          with open('/tmp/slack-details.txt', 'r') as f:
              text = f.read().strip()
          print(json.dumps(text)[1:-1])
          " 2>/dev/null || echo "See Allure report for details")

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {\"type\": \"plain_text\", \"text\": \"❌ Tests Failed — Bug Report\", \"emoji\": true}
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n${{ github.repository }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Branch:*\n${{ github.ref_name }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Triggered by:*\n${{ github.actor }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n${{ steps.run_tests.outputs.commit_msg }}\"}
                ]
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Total:* ${{ steps.run_tests.outputs.total }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Passed:* ${{ steps.run_tests.outputs.passed }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Failed:* ${{ steps.run_tests.outputs.failures }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Errors:* ${{ steps.run_tests.outputs.errors }}\"}
                ]
              },
              {
                \"type\": \"section\",
                \"text\": {\"type\": \"mrkdwn\", \"text\": \"*🔥 Failed Test Details:*\n\`\`\`${SLACK_DETAILS}\`\`\`\"}
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \"View Run Details\"},
                    \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": {\"type\": \"plain_text\", \"text\": \"View Allure Report\"},
                    \"url\": \"https://kageruka02.github.io/API-test-automation/#suites\"
                  }
                ]
              }
            ]
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
